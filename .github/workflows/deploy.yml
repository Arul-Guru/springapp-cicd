name: Springapp CI/CD

on:
  push:
    branches:
      - main
      - test
      - dev
  pull_request:

jobs:
  spring-build:
    runs-on: ubuntu-latest

    outputs:
      env: ${{steps.setenv.outputs.env}}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set Environment
        id: setenv
        run: |
          if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            echo "env=prod" >> $GITHUB_OUTPUT
          elif [[ "${GITHUB_REF}" == "refs/heads/test" ]]; then
            echo "env=test" >> $GITHUB_OUTPUT
          else:
            echo "env=dev" >> $GITHUB_OUTPUT
          fi
          

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Cache Maven Packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{runner.os}}-m2-${{hashFiles('**/pom.xml')}}
          restore-keys: |
            ${{ runner.os }}-m2

      - name: Run tests
        run: mvn test

      - name: Build application
        run: mvn clean package
#  upload
      - name: Commit JAR
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add target/*.jar
          git commit -m "Add artifact [skip ci]" || echo "No changes in JAR"
          git push

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: target/
          
  spring-deploy:
    runs-on: ubuntu-latest
    needs: spring-build

    steps:
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Checkout code
        uses: actions/checkout@v4
      - name: SonarQube Scan
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev/'
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn sonar:sonar -Dsonar.token=$SONAR_TOKEN -Dsonar.organization=arul-guru -Dsonar.host.url=https://sonarcloud.io/ -Dsonar.projectKey=Arul-Guru_springapp-cicd

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: target
      - name: Deply to Azure (dev)
        uses: azure/webapps-deploy@v3
        if: needs.spring-build.outputs.env == 'dev'
        with:
          app-name: spring-dev-ecomm
          publish-profile: ${{secrets.AZURE_WEBAPP_DEV_PUBLISH_PROFILE}}
          package: target/*.jar

      - name: Deply to Azure (test)
        uses: azure/webapps-deploy@v3
        if: needs.spring-build.outputs.env == 'test'
        with:
          app-name: spring-test-ecomm
          publish-profile: ${{secrets.AZURE_WEBAPP_TEST_PUBLISH_PROFILE}}
          package: target/*.jar

      - name: Deply to Azure (prod)
        uses: azure/webapps-deploy@v3
        if: needs.spring-build.outputs.env == 'prod'
        with:
          app-name: spring-prod-ecomm
          publish-profile: ${{secrets.AZURE_WEBAPP_PROD_PUBLISH_PROFILE}}
          package: target/*.jar